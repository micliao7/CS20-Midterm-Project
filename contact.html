                <h3>Email: hello@lunaandleaf.com</h3>
                <h3>Phone: (555) 012-LUNA</h3></br>

                <h3>Write an Email to Us</h3>
                <form action = "#" method = "GET">

                        <label>Your Name:</label>
                        <input type="text" required placeholder="your@email.com"><br>
                    </div>

                    <div class="form-group">
                        <label>Your Email:</label>
                        <input type="text" required placeholder="your@email.com"><br><br>
                    </div>
                    <div class="form-group">
                        <label>Email Content:</label>
                        <textarea placeholder="What do you want to let us know? "></textarea>
                    </div>
                    <button type="submit" class="btn-submit" >Send Email</button>
                </form>
            </div>

        </div>
