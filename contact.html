<html>
<head>
    <meta name='viewport' content="width=device-width, initial-scale=1">
    <title>Contact - Luna & Leaf</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap">
    <link rel="stylesheet" href="buisness_style.css">
    <link rel="stylesheet" href="forms.css">
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">
            <img src="images/logo-nobg.png" alt="Luna & Leaf">
            <span>Luna & Leaf</span>
        </a>
        <nav class="navBar">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about.html">About</a>
            <a href="locations.html">Locations</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Contact</a>
        </nav>
        <a href="reservations.html" class="btn-cta">Reserve</a>
    </div>
    <div class="body">
        <div class="contacts">
            <div class="contacts_box">
                <img src="images/contact_us.jpg">
            </div>
            <div class="contacts_box">
                <h1>Contact Us</h1>
                <h3>Email: hello@lunaandleaf.com</h3>
                <h3>Phone: (555) 012-LUNA</h3>
                <h3>Address: 42 Crescent Avenue, Boston, MA 02108</h3>
                <h3>Hours: Mon-Fri 1pm - 4am | Sat-Sun 1pm - 2am</h3>
                <br>
                <h3>Write an Email to Us</h3>
                <form id="contactForm" action="#" method="GET">
                    <div class="form-group">
                        <label>Your Name:</label>
                        <input type="text" id="contactName" required placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label>Your Email:</label>
                        <input type="email" id="contactEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Message:</label>
                        <textarea id="contactMessage" placeholder="What do you want to let us know?"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Email</button>
                </form>
            </div>
        </div>
        <div class="FAQ">
        </div>
    </div>
    <footer class="footer">
        <a href="index.html"><img src="images/logo-nobg.png" alt="Luna & Leaf"></a>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var name = document.getElementById('contactName').value.trim();
            var email = document.getElementById('contactEmail').value.trim();
            var message = document.getElementById('contactMessage').value.trim();

            if (!name) {
                alert('Please enter your name.');
                return;
            }
            if (!email) {
                alert('Please enter your email.');
                return;
            }
            if (!message) {
                alert('Please enter a message.');
                return;
            }

            alert('Thank you for your message! We\'ll get back to you soon.');
        });
    </script>
</body>
</html>
