<div class="contacts_box">
    <h1>Contact Us</h1>
    <h3>Email: hello@lunaandleaf.com</h3>
    <h3>Phone: (555) 012-LUNA</h3>
    <h3>Address: 42 Crescent Avenue, Boston, MA 02108</h3>
    <h3>Hours: Mon-Fri 1pm - 4am | Sat-Sun 1pm - 2am</h3>
    <br>
    <h3>Write an Email to Us</h3>
    <form id="contactForm" action="#" method="GET">
        <div class="form-group">
            <label>Your Name:</label>
            <input type="text" id="contactName" required placeholder="Your name">
        </div>
        <div class="form-group">
            <label>Your Email:</label>
            <input type="email" id="contactEmail" required placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Message:</label>
            <textarea id="contactMessage" placeholder="What do you want to let us know?"></textarea>
        </div>
        <button type="submit" class="btn-submit">Send Email</button>
    </form>
</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var name = document.getElementById('contactName').value.trim();
        var email = document.getElementById('contactEmail').value.trim();
        var message = document.getElementById('contactMessage').value.trim();

        if (!name) {
            alert('Please enter your name.');
            return;
        }
        if (!email) {
            alert('Please enter your email.');
            return;
        }
        if (!message) {
            alert('Please enter a message.');
            return;
        }

        alert('Thank you for your message! We\'ll get back to you soon.');
    });
</script>
