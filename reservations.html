<html>
<head>
    <meta name='viewport' content="width=device-width, initial-scale=1">
    <title>Reservations - Luna & Leaf</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap">
    <link rel="stylesheet" href="buisness_style.css">
    <link rel="stylesheet" href="forms.css">
</head>

<body>
    <div class="header">
        <a href="index.html" class="logo">
            <img src="logo-nobg.png" alt="Luna & Leaf">
            <span>Luna & Leaf</span>
        </a>
        <nav class="navBar">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about.html">About</a>
            <a href="locations.html">Locations</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Contact</a>
        </nav>
        <a href="reservations.html" class="btn-cta">Reserve</a>
    </div>

    <div class="body">
        <h1>Reservations</h1>
        <p>Book a table at Luna & Leaf.</p>

        <form id="reservationForm" class="reservation-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="partySize">Party size</label>
                <select id="partySize" name="partySize" required>
                    <option value="">Select...</option>
                    <option value="1-2">1-2 guests</option>
                    <option value="3-4">3-4 guests</option>
                    <option value="5-6">5-6 guests</option>
                    <option value="7+">7+ guests</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notes">Special requests</label>
                <textarea id="notes" name="notes" rows="3" placeholder="Dietary needs, allergies, celebration..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit reservation</button>
        </form>
    </div>

    <script>
        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var name = document.getElementById('name').value.trim();
            var email = document.getElementById('email').value.trim();
            var partySize = document.getElementById('partySize').value;

            if (!name) {
                alert('Please enter your name.');
                return;
            }
            if (!email) {
                alert('Please enter your email.');
                return;
            }
            if (!partySize) {
                alert('Please select party size.');
                return;
            }

            alert('Thank you for your reservation! We\'ll confirm by email shortly.');
        });
    </script>
</body>
</html>
