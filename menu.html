<html>
<head>
    <meta name='viewport' content="width=device-width, initial-scale=1">
    <title>Menu - Luna & Leaf</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap">
    <link rel="stylesheet" href="buisness_style.css">

    <script>

        window.onload = function () {
            fetch("https://raw.githubusercontent.com/micliao7/CS20-Midterm-Project/refs/heads/main/menu_items.json")
                .then(response => {
                    if (!response.ok){
                        console.log("unable to fetch data");
                    } else {
                        return response.json();
                    }
                })
                .then(data => {
                    console.log(data.menu_items);
                    let str = "";
                    let i = 0;
                    for (let item of data.menu_items) {
                        str += "<div class='menu_box" + i + "'><h3>" + item.Name + "</h3>"
                        + "<p>" + item.Description + "</p>"
                        + "<p>Price: " + item.Price + "</p>"
                        + "</div>";

                        //iterates between menu_box0 and menu_box1 for styling
                        if (i == 0) {i = 1;}
                        else {i = 0;}
                    }

                    document.getElementById("menu").innerHTML = str;
                })


            /*
                console.log(data);
                
                */
            
        }
    </script>
</head>

<body>
    <div class="header">
        <a href="index.html" class="logo">
            <img src="logo-nobg.png" alt="Luna & Leaf">
            <span>Luna & Leaf</span>
        </a>
        <nav class="navBar">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about.html">About</a>
            <a href="locations.html">Locations</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Contact</a>
        </nav>
        <a href="reservations.html" class="btn-cta">Reserve</a>
    </div>

    <div class="body">
        <h1>Menu</h1>
        <div id="menu">

        </div>
        <p>Content placeholder.</p>
    </div>

</body>
</html>
